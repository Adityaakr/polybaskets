type Basket @entity {
  id: ID!
  basketId: BigInt! @index
  basketProgramId: String! @index
  assetKind: String! @index
  creator: String! @index
  createdAt: DateTime! @index
  status: String! @index
}

type BasketSettlement @entity {
  id: ID!
  basketId: String! @index
  dayId: BigInt @index
  finalizedAt: DateTime @index
  payoutPerShare: BigInt
  status: String! @index
}

type ChipPosition @entity {
  id: ID!
  basketId: String! @index
  user: String! @index
  shares: BigInt!
  indexAtCreationBps: Int!
  claimed: Boolean!
  updatedAt: DateTime! @index
}

type DailyBasketContribution @entity {
  id: ID!
  dayId: BigInt! @index
  basketId: String! @index
  user: String! @index
  realizedProfit: BigInt!
  payout: BigInt!
  principal: BigInt!
  finalizedAt: DateTime! @index
}

type DailyUserAggregate @entity {
  id: ID!
  dayId: BigInt! @index
  user: String! @index
  realizedProfit: BigInt!
  basketCount: Int!
  updatedAt: DateTime! @index
}

type DailyUserActivityAggregate @entity {
  id: ID!
  dayId: BigInt! @index
  user: String! @index
  txCount: Int!
  basketsMade: Int!
  betsPlaced: Int!
  approvesCount: Int!
  claimsCount: Int!
  lastTxAt: DateTime! @index
  lastTxBlock: BigInt!
  lastTxMessageId: String!
  updatedAt: DateTime! @index
}

type ContestDayProjection @entity {
  id: ID!
  dayId: BigInt! @index
  status: String! @index
  maxRealizedProfit: BigInt
  winnerCount: Int!
  totalReward: BigInt
  settledOnChain: Boolean! @index
  indexerComplete: Boolean! @index
  settlementAllowedAt: DateTime! @index
  settledAt: DateTime @index
  resultHash: String
  evidenceHash: String
  updatedAt: DateTime! @index
}

type ContestDayWinner @entity {
  id: ID!
  dayId: String! @index
  user: String! @index
  realizedProfit: BigInt!
  reward: BigInt
}

type IndexerState @entity {
  id: ID!
  lastProcessedBlock: BigInt
  lastProcessedAt: DateTime
  knownGapDetected: Boolean!
  startDayId: BigInt
  lastMaterializedDayId: BigInt
  updatedAt: DateTime! @index
}
